services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://relay:relay@db:5432/relay
      DEMO_WEBHOOK_SECRET: ${DEMO_WEBHOOK_SECRET}
      DEMO_DESTINATION_URL: ${DEMO_DESTINATION_URL}
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    command: python worker.py
    environment:
      DATABASE_URL: postgresql+asyncpg://relay:relay@db:5432/relay
      DEMO_WEBHOOK_SECRET: ${DEMO_WEBHOOK_SECRET}
      DEMO_DESTINATION_URL: ${DEMO_DESTINATION_URL}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
