databases:
  - name: relay-db
    databaseName: relay
    user: relay
    plan: free

services:
  - type: web
    name: relay-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    dockerCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: relay-db
          property: connectionString
      - key: DEMO_WEBHOOK_SECRET
        sync: false
      - key: DEMO_DESTINATION_URL
        sync: false

  - type: worker
    name: relay-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    dockerCommand: python worker.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: relay-db
          property: connectionString
      - key: DEMO_WEBHOOK_SECRET
        sync: false
      - key: DEMO_DESTINATION_URL
        sync: false
