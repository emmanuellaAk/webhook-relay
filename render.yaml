databases:
  - name: relay-db
    databaseName: relay
    user: relay
    plan: free

services:
  - type: web
    name: relay-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    dockerCommand: sh start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: relay-db
          property: connectionString
      - key: DEMO_WEBHOOK_SECRET
        sync: false
      - key: DEMO_DESTINATION_URL
        sync: false
